name: Deploy Pigeon to GitHub Pages

# Publishes the static export of the Pigeon news app to GitHub Pages at
# https://ipud67.github.io/pigeon/ . Public deploy mirror under the ipud67 identity — the
# canonical source + internal planning docs live in the PRIVATE repo ipud67/pigeon-newsapp
# and are deliberately NOT mirrored here. No paid LLM call: ingest runs with the mock
# classifier (RED LINE). The deploy builds from the COMMITTED, curated data/facts.json —
# it does NOT re-ingest live feeds, because the curated dataset carries stable fact ids that
# the hand-researched depth overrides (data/depth-overrides.json) and the importance ranking
# demo depend on; a fresh feed pull would rotate ids and orphan that research. Refresh the
# dataset via the canonical repo's re-enrich/ingest pass, then re-mirror.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build static export (from committed curated data/facts.json; no live re-ingest)
        env:
          PIGEON_BASE_PATH: /pigeon
        run: npm run build

      - name: Ensure Jekyll is disabled on the artifact
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
